<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexa Profile</title>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #050510;
  color: white;
}

/* BACKDROP */
.backdrop {
  height: 240px;
  position: relative;
  background: linear-gradient(135deg,#6366f1,#8b5cf6);
  background-size: cover;
}

.backdrop::after {
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  backdrop-filter: blur(10px);
}

/* TOP BAR */
.topbar {
  position:absolute;
  width:100%;
  padding:15px;
  display:flex;
  justify-content:space-between;
  z-index:2;
  font-size:20px;
}

/* SEARCH */
.search-box {
  padding: 12px;
}

.search-box input {
  width: 100%;
  padding: 12px;
  border-radius: 15px;
  border: none;
  background: rgba(255,255,255,0.06);
  color: white;
  backdrop-filter: blur(15px);
}

/* RESULTS */
.user {
  padding: 12px;
  border-radius: 12px;
  background: rgba(255,255,255,0.05);
  margin-top: 6px;
}

/* CARD */
.card {
  margin: -90px 12px 12px;
  padding: 20px;
  border-radius: 30px;
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(30px);
  box-shadow: 0 0 40px rgba(139,92,246,0.3);
}

/* AVATAR */
.avatar {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  border: 4px solid #050510;
  box-shadow: 0 0 30px #8b5cf6;
}

/* TEXT */
.name { font-size: 22px; font-weight: bold; }
.username { opacity: .6; }
.bio { margin-top: 10px; }

/* STATS */
.stats {
  display:flex;
  justify-content: space-around;
  margin-top:15px;
  text-align:center;
}

/* BUTTON */
button {
  width:100%;
  padding:12px;
  border:none;
  border-radius:15px;
  margin-top:12px;
  background: linear-gradient(135deg,#6366f1,#8b5cf6);
  color:white;
  font-weight:bold;
  cursor:pointer;
}

/* FLOAT EDIT PANEL */
.edit-panel {
  display:none;
  margin-top:15px;
}

.edit-panel input {
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:10px;
  border:none;
  background: rgba(255,255,255,0.07);
  color:white;
}
</style>
</head>

<body>

<div class="backdrop" id="backdrop">
  <div class="topbar">
    <div>☰</div>
    <div id="adminBtn" style="display:none;">⚙️</div>
  </div>
</div>

<div class="search-box">
  <input id="searchInput" placeholder="🔍 Search users...">
</div>

<div id="results"></div>

<div class="card">
  <img id="avatarPreview" class="avatar">

  <div class="name" id="fullName"></div>
  <div class="username" id="usernameDisplay"></div>
  <div class="bio" id="bioDisplay"></div>

  <div class="stats">
    <div><b id="followersCount">0</b><br><small>Followers</small></div>
    <div id="followingBox"><b id="followingCount">0</b><br><small>Following</small></div>
  </div>

  <button id="actionBtn"></button>

  <!-- EDIT INLINE -->
  <div id="editPanel" class="edit-panel">
    <input id="editFullName" placeholder="Full Name">
    <input id="editUsername" placeholder="Username">
    <input id="editBio" placeholder="Bio">
    <input id="editAvatar" placeholder="Avatar URL">
    <input id="editBackdrop" placeholder="Backdrop URL">

    <button onclick="saveEdit()">Save Changes</button>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA26P-LTPAmChtCrDg601qGcPYK5uJDqeA",
  authDomain: "mega-project-3cee2.firebaseapp.com",
  projectId: "mega-project-3cee2",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let currentUser, profileId;

const params = new URLSearchParams(window.location.search);
profileId = params.get("uid");

auth.onAuthStateChanged(user => {
  if (!user) location.href = "index.html";

  currentUser = user.uid;

  // ADMIN BUTTON
  if (user.email === "kwamemarfo916@gmail.com") {
    adminBtn.style.display = "block";
    adminBtn.onclick = () => location.href = "admin.html";
  }

  if (!profileId) profileId = user.uid;

  loadProfile();
});

function loadProfile() {
  db.collection("users").doc(profileId).get().then(doc => {
    const d = doc.data();

    fullName.innerText = d.fullName || "User";
    usernameDisplay.innerText = "@" + (d.username || "user");
    bioDisplay.innerText = d.bio || "";

    avatarPreview.src = d.avatar || "";
    backdrop.style.backgroundImage = `url(${d.backdrop})`;

    setupUI();
    loadFollow();
  });
}

function setupUI() {
  if (currentUser === profileId) {
    actionBtn.innerText = "Edit Profile ✏️";
    actionBtn.onclick = () => {
      editPanel.style.display =
        editPanel.style.display === "block" ? "none" : "block";
    };
  } else {
    followingBox.style.display = "none";
    actionBtn.onclick = toggleFollow;
  }
}

function toggleFollow() {
  const id = currentUser + "_" + profileId;
  const ref = db.collection("follows").doc(id);

  ref.get().then(doc => {
    if (doc.exists) {
      ref.delete().then(loadFollow);
    } else {
      ref.set({ from: currentUser, to: profileId }).then(loadFollow);
    }
  });
}

function loadFollow() {
  db.collection("follows").where("to","==",profileId).get()
    .then(s => followersCount.innerText = s.size);

  if (currentUser === profileId) {
    db.collection("follows").where("from","==",profileId).get()
      .then(s => followingCount.innerText = s.size);
  }

  if (currentUser !== profileId) {
    const ref = db.collection("follows").doc(currentUser+"_"+profileId);
    ref.get().then(doc=>{
      actionBtn.innerText = doc.exists ? "Unfollow ❌" : "Follow 🔥";
    });
  }
}

function saveEdit() {
  db.collection("users").doc(currentUser).update({
    fullName: editFullName.value,
    username: editUsername.value,
    bio: editBio.value,
    avatar: editAvatar.value,
    backdrop: editBackdrop.value
  }).then(()=>{
    loadProfile();
    editPanel.style.display = "none";
  });
}

// SEARCH
searchInput.addEventListener("input", function() {
  const value = this.value.toLowerCase();
  results.innerHTML = "";

  if (!value) return;

  db.collection("users").get().then(snapshot => {
    snapshot.forEach(doc => {
      const user = doc.data();

      if (user.username && user.username.toLowerCase().includes(value)) {
        const div = document.createElement("div");
        div.className = "user";
        div.innerText = user.username;

        div.onclick = () => {
          window.location.href = "profile.html?uid=" + doc.id;
        };

        results.appendChild(div);
      }
    });
  });
});
</script>

</body>
                                       </html>
