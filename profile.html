<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXA Profile PRO</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Segoe UI';
  background:#0a0a0f;
  color:white;
}

/* COVER */
.cover{
  height:240px;
  background:linear-gradient(135deg,#6a00ff,#9d4edd);
}

/* PROFILE CARD */
.profile{
  margin-top:-80px;
  padding:20px;
  backdrop-filter:blur(30px);
  background:rgba(255,255,255,0.05);
  border-radius:20px;
  margin: -80px 15px 15px;
  box-shadow:0 0 50px rgba(138,43,226,0.3);
}

.avatar{
  width:120px;
  height:120px;
  border-radius:50%;
  border:4px solid #0a0a0f;
  margin-top:-80px;
}

/* HEADER */
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.stats{
  display:flex;
  gap:20px;
  margin-top:10px;
}

button{
  background:linear-gradient(45deg,#6a00ff,#9d4edd);
  border:none;
  padding:10px 18px;
  border-radius:25px;
  color:white;
  cursor:pointer;
}

/* TABS */
.tabs{
  display:flex;
  justify-content:space-around;
  border-bottom:1px solid #222;
}
.tab{
  padding:12px;
  cursor:pointer;
  color:gray;
}
.tab.active{
  color:white;
  border-bottom:2px solid #9d4edd;
}

/* POSTS */
.post{
  margin:15px;
  padding:15px;
  background:rgba(255,255,255,0.05);
  border-radius:15px;
}
.post img{
  width:100%;
  border-radius:10px;
}
.actions i{
  margin-right:15px;
  cursor:pointer;
  color:#aaa;
}
.actions i:hover{
  color:#9d4edd;
}

/* MODAL */
.modal{
  position:fixed;
  top:0;
  width:100%;
  height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.7);
}
.modal-content{
  background:#111;
  padding:20px;
  border-radius:15px;
  width:90%;
}
input,textarea{
  width:100%;
  margin:10px 0;
  padding:10px;
  background:#1a1a1a;
  border:none;
  color:white;
  border-radius:8px;
}

/* SEARCH */
.search{
  margin:15px;
}
.search input{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
}
.result{
  padding:10px;
  border-bottom:1px solid #222;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="cover" id="cover"></div>

<div class="profile">
  <img id="avatar" class="avatar">
  
  <div class="top">
    <div>
      <h2 id="username"></h2>
      <p id="handle"></p>
    </div>
    <button id="actionBtn"></button>
  </div>

  <div class="stats">
    <span><b id="followers">0</b> Followers</span>
    <span><b id="following">0</b> Following</span>
  </div>
</div>

<!-- SEARCH -->
<div class="search">
  <input id="searchInput" placeholder="Search users...">
  <div id="searchResults"></div>
</div>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" onclick="switchTab('posts',this)">Posts</div>
  <div class="tab" onclick="switchTab('bookmarks',this)">Bookmarks</div>
  <div class="tab" onclick="switchTab('articles',this)">Articles</div>
</div>

<div id="content"></div>

<!-- EDIT PROFILE -->
<div id="modal" class="modal">
  <div class="modal-content">
    <h3>Edit Profile</h3>
    <input id="editUsername" placeholder="Username">
    <input id="editPhone" placeholder="Phone">
    <input type="date" id="editDOB">
    <textarea id="editBio" placeholder="Bio"></textarea>
    <button onclick="saveProfile()">Save</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import {
  getFirestore, doc, getDoc, setDoc, updateDoc,
  collection, query, where, onSnapshot, deleteDoc, addDoc
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const app = initializeApp({
  apiKey:"AIzaSyA26P-LTPAmChtCrDg601qGcPYK5uJDqeA",
  authDomain:"mega-project-3cee2.firebaseapp.com",
  projectId:"mega-project-3cee2"
});

const db=getFirestore(app);
const auth=getAuth(app);

let uid,profileId,isOwner;

/* AUTH */
onAuthStateChanged(auth, async user=>{
  if(!user) return;

  uid=user.uid;
  profileId=new URLSearchParams(location.search).get("id")||uid;
  isOwner=uid===profileId;

  loadProfile();
  followSystem();
  realtimeStats();
  loadPosts();
});

/* PROFILE */
function loadProfile(){
  onSnapshot(doc(db,"users",profileId),snap=>{
    const d=snap.data()||{};
    username.innerText=d.username||"User";
    handle.innerText=d.handle||"@user";
    avatar.src=d.avatar||"https://i.imgur.com/2yaf2wb.png";
  });
}

/* FOLLOW SYSTEM */
function followSystem(){
  if(isOwner){
    actionBtn.innerText="Edit";
    actionBtn.onclick=()=>modal.style.display="flex";
  }else{
    const followRef=doc(db,"follows",uid+"_"+profileId);

    onSnapshot(followRef,snap=>{
      if(snap.exists()){
        actionBtn.innerText="Unfollow";
        actionBtn.onclick=()=>deleteDoc(followRef);
      }else{
        actionBtn.innerText="Follow";
        actionBtn.onclick=()=>setDoc(followRef,{
          userId:uid,
          targetId:profileId
        });
      }
    });
  }
}

/* STATS */
function realtimeStats(){
  onSnapshot(query(collection(db,"follows"),where("targetId","==",profileId)),
    s=>followers.innerText=s.size);

  onSnapshot(query(collection(db,"follows"),where("userId","==",profileId)),
    s=>following.innerText=s.size);
}

/* POSTS */
function loadPosts(){
  onSnapshot(query(collection(db,"posts"),where("userId","==",profileId)),snap=>{
    let html="";
    snap.forEach(d=>{
      const p=d.data(),id=d.id;

      html+=`
      <div class="post">
        <b>${p.content}</b>
        <div class="actions">
          <i class="fa fa-heart"></i>
          <i class="fa fa-comment"></i>
          <i class="fa fa-bookmark"></i>
          ${isOwner?`<i class="fa fa-trash" onclick="deletePost('${id}')"></i>`:""}
        </div>
      </div>`;
    });
    content.innerHTML=html;
  });
}

window.deletePost=id=>deleteDoc(doc(db,"posts",id));

/* SEARCH USERS */
searchInput.oninput=()=>{
  const q=searchInput.value;

  onSnapshot(collection(db,"users"),snap=>{
    let html="";
    snap.forEach(d=>{
      const u=d.data();
      if(u.username?.toLowerCase().includes(q.toLowerCase())){
        html+=`<div class="result" onclick="go('${d.id}')">${u.username}</div>`;
      }
    });
    searchResults.innerHTML=html;
  });
};

window.go=id=>{
  location.href="?id="+id;
};

/* SAVE PROFILE */
window.saveProfile=()=>{
  updateDoc(doc(db,"users",uid),{
    username:editUsername.value,
    phone:editPhone.value,
    bio:editBio.value
  });
  modal.style.display="none";
};

/* TABS */
window.switchTab=(t,el)=>{
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
  el.classList.add("active");

  if(t==="bookmarks"){
    content.innerHTML="<p>Bookmarks coming...</p>";
  }else if(t==="articles"){
    content.innerHTML="<p>Articles coming...</p>";
  }else{
    loadPosts();
  }
};
</script>

</body>
  </html>
