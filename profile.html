<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXA Profile</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Segoe UI';
  background:#0a0a0f;
  color:white;
}

/* COVER */
.cover{
  height:220px;
  background-size:cover;
  background-position:center;
}

/* PROFILE CARD */
.profile-card{
  margin:-70px 15px 15px;
  padding:20px;
  border-radius:20px;
  backdrop-filter:blur(25px);
  background:rgba(255,255,255,0.05);
  box-shadow:0 0 40px rgba(138,43,226,0.3);
  text-align:center;
  position:relative;
}

.avatar{
  width:110px;
  height:110px;
  border-radius:50%;
  margin-top:-80px;
  border:3px solid #000;
  object-fit:cover;
}

.stats{
  display:flex;
  justify-content:center;
  gap:25px;
  margin:12px 0;
  font-size:14px;
}

.stats b{
  font-size:18px;
}

/* BUTTON */
button{
  padding:10px 20px;
  border:none;
  border-radius:25px;
  background:linear-gradient(45deg,#6a00ff,#9d4edd);
  color:white;
  cursor:pointer;
  font-weight:bold;
  margin-top:10px;
}

/* TABS */
.tabs{
  display:flex;
  justify-content:space-around;
  border-bottom:1px solid #222;
}

.tab{
  padding:12px;
  cursor:pointer;
  color:gray;
}

.tab.active{
  color:white;
  border-bottom:2px solid #9d4edd;
}

/* POSTS */
.post{
  margin:15px;
  padding:12px;
  background:rgba(255,255,255,0.05);
  border-radius:12px;
}

.post img{
  width:100%;
  border-radius:10px;
  margin-top:10px;
}

/* MODAL */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:#111;
  padding:20px;
  border-radius:15px;
  width:90%;
  max-width:400px;
}

.modal input, .modal textarea{
  width:100%;
  margin:8px 0;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#1a1a1a;
  color:white;
}
</style>
</head>

<body>

<div id="cover" class="cover"></div>

<div class="profile-card">
  <img id="avatar" class="avatar">

  <h2 id="username"></h2>
  <p id="handle"></p>

  <div class="stats">
    <span><b id="followers">0</b><br>Followers</span>
    <span><b id="following">0</b><br>Following</span>
  </div>

  <button id="actionBtn"></button>
</div>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" onclick="switchTab('posts', this)">Posts</div>
  <div class="tab" onclick="switchTab('bookmarks', this)">Bookmarks</div>
</div>

<div id="content"></div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <h3>Edit Profile</h3>

    <input id="editUsername" placeholder="Username">
    <input id="editPhone" placeholder="Phone">
    <input id="editDOB" type="date">
    <textarea id="editBio" placeholder="Bio"></textarea>

    <label>Avatar</label>
    <input type="file" id="avatarInput">

    <label>Cover</label>
    <input type="file" id="coverInput">

    <button onclick="saveProfile()">Save</button>
    <button onclick="closeModal()">Cancel</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

import {
  getFirestore, doc, getDoc, updateDoc,
  collection, query, where,
  onSnapshot, setDoc, deleteDoc
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

import {
  getAuth, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

import {
  getStorage, ref, uploadBytes, getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

/* CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyA26P-LTPAmChtCrDg601qGcPYK5uJDqeA",
  authDomain: "mega-project-3cee2.firebaseapp.com",
  projectId: "mega-project-3cee2",
  storageBucket: "mega-project-3cee2.appspot.com",
  messagingSenderId: "98906748629",
  appId: "1:98906748629:web:504352bbff7ed4d019145c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const storage = getStorage(app);

let uid = null;
let profileId = null;
let isOwner = false;

/* AUTH */
onAuthStateChanged(auth, async (user)=>{
  if(!user) return location.href="login.html";

  uid = user.uid;
  profileId = new URLSearchParams(window.location.search).get("id") || uid;
  isOwner = uid === profileId;

  loadProfile();
  realtimeFollowers();
  setupFollowButton();
  loadPosts();
});

/* PROFILE */
async function loadProfile(){
  const snap = await getDoc(doc(db,"users",profileId));
  if(!snap.exists()) return;

  const d = snap.data();

  username.innerText = d.username || "No Name";
  handle.innerText = d.handle || "@user";

  avatar.src = d.avatar || "https://i.imgur.com/2yaf2wb.png";
  cover.style.backgroundImage = `url(${d.cover || "https://i.imgur.com/oYiTqum.jpg"})`;

  editUsername.value = d.username || "";
  editPhone.value = d.phone || "";
  editDOB.value = d.dob || "";
  editBio.value = d.bio || "";
}

/* FOLLOW SYSTEM */
function setupFollowButton(){
  const btn = actionBtn;

  if(isOwner){
    btn.innerText = "Edit Profile";
    btn.onclick = ()=> modal.style.display="flex";
    return;
  }

  const followRef = doc(db,"follows", uid+"_"+profileId);

  onSnapshot(followRef, snap=>{
    btn.innerText = snap.exists() ? "Following" : "Follow";
  });

  btn.onclick = async ()=>{
    const snap = await getDoc(followRef);

    if(snap.exists()){
      await deleteDoc(followRef);
    }else{
      await setDoc(followRef,{
        userId: uid,
        targetId: profileId,
        time: Date.now()
      });
    }
  };
}

/* REALTIME COUNTS */
function realtimeFollowers(){
  onSnapshot(query(collection(db,"follows"), where("targetId","==",profileId)),
    snap=> followers.innerText = snap.size);

  onSnapshot(query(collection(db,"follows"), where("userId","==",profileId)),
    snap=> following.innerText = snap.size);
}

/* POSTS */
function loadPosts(){
  onSnapshot(query(collection(db,"posts"), where("userId","==",profileId)), snap=>{
    let html="";
    snap.forEach(doc=>{
      const p = doc.data();
      html+=`
      <div class="post">
        <p>${p.content || ""}</p>
        ${p.image ? `<img src="${p.image}">` : ""}
      </div>`;
    });
    content.innerHTML = html || "<p style='text-align:center'>No posts</p>";
  });
}

/* BOOKMARKS */
function loadBookmarks(){
  onSnapshot(query(collection(db,"bookmarks"), where("userId","==",uid)), snap=>{
    let html="";
    snap.forEach(doc=>{
      html+=`<div class="post">Saved: ${doc.data().postId}</div>`;
    });
    content.innerHTML = html || "No bookmarks";
  });
}

/* TABS */
window.switchTab = function(tab,el){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");

  tab==="posts" ? loadPosts() : loadBookmarks();
}

/* MODAL */
window.closeModal = ()=> modal.style.display="none";

/* SAVE PROFILE */
window.saveProfile = async ()=>{
  let avatarURL=null, coverURL=null;

  const avatarFile = avatarInput.files[0];
  const coverFile = coverInput.files[0];

  if(avatarFile){
    const r = ref(storage,"avatars/"+uid);
    await uploadBytes(r,avatarFile);
    avatarURL = await getDownloadURL(r);
  }

  if(coverFile){
    const r = ref(storage,"covers/"+uid);
    await uploadBytes(r,coverFile);
    coverURL = await getDownloadURL(r);
  }

  await updateDoc(doc(db,"users",uid),{
    username: editUsername.value,
    phone: editPhone.value,
    dob: editDOB.value,
    bio: editBio.value,
    ...(avatarURL && {avatar: avatarURL}),
    ...(coverURL && {cover: coverURL})
  });

  closeModal();
  loadProfile();
}
</script>

</body>
    </html>
