<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXA Profile</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Segoe UI';
  background:#0a0a0f;
  color:white;
}

/* COVER */
.cover{
  height:200px;
  background-size:cover;
  background-position:center;
}

/* PROFILE */
.profile-card{
  margin:-60px 15px;
  padding:20px;
  border-radius:20px;
  backdrop-filter:blur(20px);
  background:rgba(255,255,255,0.05);
  box-shadow:0 0 40px rgba(138,43,226,0.3);
  text-align:center;
}

.avatar{
  width:100px;
  height:100px;
  border-radius:50%;
  margin-top:-70px;
  border:3px solid black;
}

.stats{
  display:flex;
  justify-content:center;
  gap:20px;
  margin:10px 0;
}

button{
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:linear-gradient(45deg,#6a00ff,#9d4edd);
  color:white;
  cursor:pointer;
}

/* TABS */
.tabs{
  display:flex;
  justify-content:space-around;
  border-bottom:1px solid #222;
}

.tab{
  padding:12px;
  cursor:pointer;
  color:gray;
}

.tab.active{
  color:white;
  border-bottom:2px solid #9d4edd;
}

/* POSTS */
.post{
  margin:15px;
  padding:10px;
  background:rgba(255,255,255,0.05);
  border-radius:10px;
}

.post img{
  width:100%;
  border-radius:10px;
}

/* MODAL */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:#111;
  padding:20px;
  border-radius:15px;
  width:90%;
  max-width:400px;
}

.modal input, .modal textarea{
  width:100%;
  margin:8px 0;
  padding:10px;
  border:none;
  border-radius:8px;
}
</style>
</head>

<body>

<div id="cover" class="cover"></div>

<div class="profile-card">
  <img id="avatar" class="avatar">

  <h2 id="username"></h2>
  <p id="handle"></p>

  <div class="stats">
    <span><b id="followers">0</b> Followers</span>
    <span><b id="following">0</b> Following</span>
  </div>

  <button id="editBtn">Edit Profile</button>
</div>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" onclick="switchTab('posts', this)">Posts</div>
  <div class="tab" onclick="switchTab('bookmarks', this)">Bookmarks</div>
</div>

<div id="content"></div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <h3>Edit Profile</h3>

    <input id="editUsername" placeholder="Username">
    <input id="editPhone" placeholder="Phone">
    <input id="editDOB" type="date">
    <textarea id="editBio" placeholder="Bio"></textarea>

    <button onclick="saveProfile()">Save</button>
    <button onclick="closeModal()">Cancel</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import {
  getFirestore, doc, getDoc, updateDoc,
  collection, query, where,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

import {
  getAuth, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyA26P-LTPAmChtCrDg601qGcPYK5uJDqeA",
  authDomain: "mega-project-3cee2.firebaseapp.com",
  projectId: "mega-project-3cee2",
  storageBucket: "mega-project-3cee2.appspot.com",
  messagingSenderId: "98906748629",
  appId: "1:98906748629:web:504352bbff7ed4d019145c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let uid = null;

/* AUTH */
onAuthStateChanged(auth, async (user)=>{
  if(!user) return location.href="login.html";
  uid = user.uid;
  loadProfile();
  realtimeFollowers();
  loadPosts();
});

/* LOAD PROFILE */
async function loadProfile(){
  const ref = doc(db,"users",uid);
  const snap = await getDoc(ref);
  if(!snap.exists()) return;

  const d = snap.data();

  username.innerText = d.username || "No Name";
  handle.innerText = d.handle || "@user";

  avatar.src = d.avatar || "https://i.imgur.com/DefaultAvatar.png";
  cover.style.backgroundImage = `url(${d.cover || "https://i.imgur.com/DefaultCover.jpg"})`;

  editUsername.value = d.username || "";
  editPhone.value = d.phone || "";
  editDOB.value = d.dob || "";
  editBio.value = d.bio || "";
}

/* REALTIME FOLLOWERS */
function realtimeFollowers(){
  const followersRef = query(collection(db,"follows"), where("targetId","==",uid));
  onSnapshot(followersRef, snap=>{
    followers.innerText = snap.size;
  });

  const followingRef = query(collection(db,"follows"), where("userId","==",uid));
  onSnapshot(followingRef, snap=>{
    following.innerText = snap.size;
  });
}

/* POSTS */
function loadPosts(){
  const q = query(collection(db,"posts"), where("userId","==",uid));

  onSnapshot(q, snap=>{
    let html="";
    snap.forEach(doc=>{
      const p = doc.data();
      html+=`
      <div class="post">
        <p>${p.content || ""}</p>
        ${p.image ? `<img src="${p.image}">` : ""}
      </div>`;
    });

    content.innerHTML = html || "<p style='text-align:center'>No posts</p>";
  });
}

/* BOOKMARKS */
function loadBookmarks(){
  const q = query(collection(db,"bookmarks"), where("userId","==",uid));

  onSnapshot(q, snap=>{
    let html="";
    snap.forEach(doc=>{
      html+=`<div class="post">Saved: ${doc.data().postId}</div>`;
    });
    content.innerHTML = html || "No bookmarks";
  });
}

/* TABS */
window.switchTab = function(tab,el){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");

  if(tab==="posts") loadPosts();
  if(tab==="bookmarks") loadBookmarks();
}

/* MODAL */
editBtn.onclick = ()=> modal.style.display="flex";
window.closeModal = ()=> modal.style.display="none";

/* SAVE PROFILE */
window.saveProfile = async ()=>{
  await updateDoc(doc(db,"users",uid),{
    username: editUsername.value,
    phone: editPhone.value,
    dob: editDOB.value,
    bio: editBio.value
  });

  closeModal();
  loadProfile();
}
</script>

</body>
    </html>
