<!DOCTYPE html>
<html>
<head>
  <title>Nexa Login</title>
</head>
<body style="background:#0f172a;color:white;text-align:center;font-family:sans-serif;">

  <h2>Nexa Login</h2>

  <input id="phone" placeholder="+233XXXXXXXXX"><br><br>

  <div id="recaptcha-container"></div><br>

  <button onclick="sendOTP()">Send Code</button><br><br>

  <input id="code" placeholder="Enter OTP"><br><br>
  <button onclick="verifyOTP()">Verify</button>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA26P-LTPAmChtCrDg601qGcPYK5uJDqeA",
      authDomain: "mega-project-3cee2.firebaseapp.com",
      projectId: "mega-project-3cee2",
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    window.recaptchaVerifier = new RecaptchaVerifier(
      'recaptcha-container',
      { size: "normal" },
      auth
    );

    window.sendOTP = async function () {
      const phone = document.getElementById("phone").value;

      const result = await signInWithPhoneNumber(
        auth,
        phone,
        window.recaptchaVerifier
      );

      window.confirmationResult = result;
      alert("Code sent!");
    };

    window.verifyOTP = async function () {
      const code = document.getElementById("code").value;

      const result = await window.confirmationResult.confirm(code);

      alert("Login success!");
      console.log(result.user);
    };
  </script>

</body>
    </html>
