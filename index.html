<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexa Login</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background-image: url('IMG-20260320-WA0072.jpg');
}

/* GLASS CARD */
.glass {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 340px;
  padding: 30px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  color: white;
  text-align: center;
}

h2 {
  margin-bottom: 5px;
  letter-spacing: 2px;
}

/* INPUTS */
.input-box {
  margin-top: 15px;
}

.input-box input {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: none;
  background: rgba(255,255,255,0.08);
  color: white;
  outline: none;
  transition: 0.3s;
}

.input-box input:focus {
  background: rgba(255,255,255,0.12);
  box-shadow: 0 0 10px rgba(139,92,246,0.6);
}

/* BUTTONS */
button {
  width: 100%;
  margin-top: 15px;
  padding: 14px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  color: white;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  transform: scale(1.03);
}

.google {
  background: white;
  color: black;
}

.divider {
  margin-top: 15px;
  font-size: 12px;
  opacity: 0.6;
}

/* CHECKBOX AREAS */
.remember, .agree, .captcha-box {
  text-align: left;
  font-size: 13px;
  margin-top: 10px;
}

.agree a {
  color: #a78bfa;
  text-decoration: none;
}

.agree a:hover {
  text-decoration: underline;
}

/* CAPTCHA INPUT */
.captcha-box input {
  width: 100%;
  margin-top: 5px;
  padding: 10px;
  border-radius: 8px;
  border: none;
}
</style>
</head>

<body>

<div class="glass">
  <h2>NEXA</h2>
  <p style="font-size:12px; opacity:0.6;">Login or create account</p>

  <div class="input-box">
    <input id="email" type="email" placeholder="Email">
  </div>

  <div class="input-box">
    <input id="password" type="password" placeholder="Password">
  </div>

  <div class="remember">
    <input type="checkbox" id="remember"> Remember me
  </div>

  <div class="agree">
    <input type="checkbox" id="agree">
    I agree to 
    <a href="rules.html" target="_blank">Rules</a>, 
    <a href="terms.html" target="_blank">Terms</a> and 
    <a href="privacy.html" target="_blank">Privacy Policy</a>
  </div>

  <div class="captcha-box">
    Solve: <span id="captchaText"></span>
    <input id="captchaInput" placeholder="Answer">
  </div>

  <button onclick="login()">Login</button>

  <button onclick="signup()" style="background: rgba(255,255,255,0.15);">
    Create Account
  </button>

  <div class="divider">OR</div>

  <button class="google" onclick="googleLogin()">Continue with Google</button>
</div>

<script>
// 🔥 FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyA26P-LTPAmChtCrDg601qGcPYK5uJDqeA",
  authDomain: "mega-project-3cee2.firebaseapp.com",
  projectId: "mega-project-3cee2",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// 🔢 CAPTCHA
let num1, num2;

function generateCaptcha() {
  num1 = Math.floor(Math.random() * 10);
  num2 = Math.floor(Math.random() * 10);
  document.getElementById("captchaText").innerText = `${num1} + ${num2}`;
}
generateCaptcha();

// ✅ CHECK ALL
function checkAll() {
  if (!document.getElementById("agree").checked) {
    alert("Agree to policies first");
    return false;
  }

  const answer = document.getElementById("captchaInput").value;
  if (parseInt(answer) !== num1 + num2) {
    alert("Wrong captcha");
    generateCaptcha();
    return false;
  }

  return true;
}

// 🔁 AUTH STATE
auth.onAuthStateChanged(user => {
  if (user) {
    if (user.emailVerified) {
      window.location.href = "home.html";
    } else {
      window.location.href = "verify.html";
    }
  }
});

// 🔐 LOGIN
function login() {
  if (!checkAll()) return;

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const remember = document.getElementById("remember").checked;

  const persistence = remember
    ? firebase.auth.Auth.Persistence.LOCAL
    : firebase.auth.Auth.Persistence.SESSION;

  auth.setPersistence(persistence)
    .then(() => auth.signInWithEmailAndPassword(email, password))
    .catch(err => alert(err.message));
}

// 🆕 SIGNUP
function signup() {
  if (!checkAll()) return;

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.createUserWithEmailAndPassword(email, password)
    .then((userCredential) => {

      // 📧 SEND EMAIL VERIFICATION
      userCredential.user.sendEmailVerification();

      alert("Verification email sent. Check your inbox.");

      window.location.href = "verify.html";
    })
    .catch(err => alert(err.message));
}

// 🔵 GOOGLE LOGIN
function googleLogin() {
  if (!checkAll()) return;

  const provider = new firebase.auth.GoogleAuthProvider();

  auth.signInWithPopup(provider)
    .then((result) => {
      if (!result.user.emailVerified) {
        window.location.href = "verify.html";
      } else {
        window.location.href = "home.html";
      }
    })
    .catch(err => alert(err.message));
}
</script>

</body>
      </html>
