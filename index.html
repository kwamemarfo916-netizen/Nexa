<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexa Login</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background-image: url('front.jpg');
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
}

/* Glass Card */
.glass {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 340px;
  padding: 30px;
  border-radius: 25px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(18px);
  border: 1px solid rgba(255,255,255,0.2);
  box-shadow: 0 8px 40px rgba(0,0,0,0.4);
  text-align: center;
  color: white;
}

.glass h1 {
  margin-bottom: 5px;
}

.glass p {
  font-size: 14px;
  opacity: 0.8;
}

/* Inputs */
input {
  width: 90%;
  margin-top: 12px;
  padding: 12px;
  border-radius: 12px;
  border: none;
  outline: none;
  background: rgba(255,255,255,0.2);
  color: white;
}

/* Buttons */
button {
  width: 95%;
  margin-top: 12px;
  padding: 12px;
  border-radius: 12px;
  border: none;
  background: rgba(255,255,255,0.2);
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: rgba(255,255,255,0.4);
}

/* Divider */
.divider {
  margin: 15px 0;
  font-size: 12px;
  opacity: 0.6;
}

/* Google Button */
.google {
  background: rgba(255,255,255,0.15);
}
</style>
</head>

<body>

<div class="glass">
  <h1>NEXA</h1>
  <p>Login to continue</p>

  <!-- EMAIL LOGIN -->
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <button onclick="loginEmail()">Login with Email</button>

  <div class="divider">OR</div>

  <!-- PHONE LOGIN -->
  <input type="tel" id="phone" placeholder="+233XXXXXXXXX">
  <div id="recaptcha-container"></div>
  <button onclick="sendOTP()">Send Code</button>

  <input type="text" id="otp" placeholder="Enter Code">
  <button onclick="verifyOTP()">Verify Code</button>

  <div class="divider">OR</div>

  <!-- GOOGLE LOGIN -->
  <button class="google" onclick="googleLogin()">Continue with Google</button>

  <p style="font-size:12px;">Don't have an account? Sign up</p>
</div>

<script>
// 🔥 YOUR FIREBASE CONFIG HERE
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// ✅ EMAIL LOGIN
function loginEmail() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, password)
    .then(() => alert("Login successful"))
    .catch(err => alert(err.message));
}

// ✅ GOOGLE LOGIN
function googleLogin() {
  const provider = new firebase.auth.GoogleAuthProvider();

  auth.signInWithPopup(provider)
    .then(() => alert("Google login successful"))
    .catch(err => alert(err.message));
}

// ✅ RECAPTCHA
window.onload = function () {
  window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container');
};

// ✅ SEND OTP
function sendOTP() {
  const phone = document.getElementById("phone").value;

  auth.signInWithPhoneNumber(phone, window.recaptchaVerifier)
    .then(confirmationResult => {
      window.confirmationResult = confirmationResult;
      alert("Code sent!");
    })
    .catch(err => alert(err.message));
}

// ✅ VERIFY OTP
function verifyOTP() {
  const code = document.getElementById("otp").value;

  confirmationResult.confirm(code)
    .then(() => alert("Phone login success"))
    .catch(err => alert(err.message));
}
</script>

</body>
</html>
