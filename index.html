<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexa Login</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background-image: url('IMG-20260320-WA0072.jpg');
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
}

/* Glass Card */
.glass {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 330px;
  padding: 30px;
  border-radius: 20px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(18px);
  border: 1px solid rgba(255,255,255,0.15);
  box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  text-align: center;
  color: white;
}

/* Title */
.glass h2 {
  margin-bottom: 5px;
  letter-spacing: 2px;
}

/* Inputs (FIXED - NOT FLAT) */
.input-box {
  position: relative;
  margin-top: 15px;
}

.input-box input {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.15);
  color: white;
  outline: none;
  transition: 0.3s;
}

/* Glow on focus */
.input-box input:focus {
  border: 1px solid #8b5cf6;
  box-shadow: 0 0 12px rgba(139,92,246,0.6);
}

/* Buttons */
button {
  width: 100%;
  margin-top: 15px;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.03);
}

/* Google */
.google {
  background: white;
  color: black;
}

/* Divider */
.divider {
  margin-top: 15px;
  font-size: 12px;
  opacity: 0.7;
}

/* Remember */
.remember {
  text-align: left;
  font-size: 13px;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="glass">
  <h2>NEXA</h2>
  <p style="font-size:12px; opacity:0.7;">Login to continue</p>

  <!-- EMAIL -->
  <div class="input-box">
    <input id="email" type="email" placeholder="Email">
  </div>

  <div class="input-box">
    <input id="password" type="password" placeholder="Password">
  </div>

  <!-- REMEMBER -->
  <div class="remember">
    <input type="checkbox" id="remember"> Remember me
  </div>

  <!-- LOGIN -->
  <button onclick="login()">Login</button>

  <!-- SIGNUP -->
  <button onclick="signup()" style="background: rgba(255,255,255,0.2);">
    Create Account
  </button>

  <div class="divider">OR</div>

  <!-- GOOGLE -->
  <button class="google" onclick="googleLogin()">Continue with Google</button>
</div>

<script>
// 🔥 YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyA26P-LTPAmChtCrDg601qGcPYK5uJDqeA",
  authDomain: "mega-project-3cee2.firebaseapp.com",
  projectId: "mega-project-3cee2",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// 🔥 AUTO LOGIN
auth.onAuthStateChanged(user => {
  if (user) {
    window.location.href = "home.html";
  }
});

// 🔐 LOGIN
function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const remember = document.getElementById("remember").checked;

  const persistence = remember
    ? firebase.auth.Auth.Persistence.LOCAL
    : firebase.auth.Auth.Persistence.SESSION;

  auth.setPersistence(persistence).then(() => {
    return auth.signInWithEmailAndPassword(email, password);
  })
  .then(() => {
    window.location.href = "home.html";
  })
  .catch(err => alert(err.message));
}

// 🆕 SIGNUP
function signup() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.createUserWithEmailAndPassword(email, password)
    .then(() => alert("Account created! Now login"))
    .catch(err => alert(err.message));
}

// 🔵 GOOGLE LOGIN
function googleLogin() {
  const provider = new firebase.auth.GoogleAuthProvider();

  auth.signInWithPopup(provider)
    .then(() => window.location.href = "home.html")
    .catch(err => alert(err.message));
}
</script>

</body>
</html>
