<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexa Login</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background-image: url('IMG-20260320-WA0072.jpg');
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
}

.glass {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 330px;
  padding: 30px;
  border-radius: 20px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(18px);
  border: 1px solid rgba(255,255,255,0.15);
  box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  text-align: center;
  color: white;
}

.glass h2 {
  margin-bottom: 5px;
  letter-spacing: 2px;
}

.input-box {
  margin-top: 15px;
}

.input-box input {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.15);
  color: white;
  outline: none;
  transition: 0.3s;
}

.input-box input:focus {
  border: 1px solid #8b5cf6;
  box-shadow: 0 0 12px rgba(139,92,246,0.6);
}

button {
  width: 100%;
  margin-top: 15px;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  color: white;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  transform: scale(1.03);
}

.google {
  background: white;
  color: black;
}

.divider {
  margin-top: 15px;
  font-size: 12px;
  opacity: 0.7;
}

.remember {
  text-align: left;
  font-size: 13px;
  margin-top: 10px;
}

/* AGREEMENT */
.agree {
  text-align: left;
  font-size: 12px;
  margin-top: 10px;
  color: rgba(255,255,255,0.8);
}

.agree a {
  color: #a78bfa;
  text-decoration: none;
}

.agree a:hover {
  text-decoration: underline;
}

/* SIMPLE CAPTCHA */
.captcha-box {
  margin-top: 10px;
  text-align: left;
  font-size: 13px;
}
</style>
</head>

<body>

<div class="glass">
  <h2>NEXA</h2>
  <p style="font-size:12px; opacity:0.7;">Login to continue</p>

  <div class="input-box">
    <input id="email" type="email" placeholder="Email">
  </div>

  <div class="input-box">
    <input id="password" type="password" placeholder="Password">
  </div>

  <div class="remember">
    <input type="checkbox" id="remember"> Remember me
  </div>

  <!-- AGREEMENT -->
  <div class="agree">
    <input type="checkbox" id="agree">
    I agree to the 
    <a href="rules.html" target="_blank">Nexa Rules</a>, 
    <a href="terms.html" target="_blank">Terms</a> and 
    <a href="privacy.html" target="_blank">Privacy Policy</a>
  </div>

  <!-- SIMPLE CAPTCHA -->
  <div class="captcha-box">
    Solve: <span id="captchaText"></span>
    <input id="captchaInput" placeholder="Answer" style="margin-top:5px; width:100%; padding:10px; border-radius:10px; border:none;">
  </div>

  <button onclick="login()">Login</button>

  <button onclick="signup()" style="background: rgba(255,255,255,0.2);">
    Create Account
  </button>

  <div class="divider">OR</div>

  <button class="google" onclick="googleLogin()">Continue with Google</button>
</div>

<script>
// 🔥 FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyA26P-LTPAmChtCrDg601qGcPYK5uJDqeA",
  authDomain: "mega-project-3cee2.firebaseapp.com",
  projectId: "mega-project-3cee2",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// 🔥 CAPTCHA GENERATOR
let num1, num2;

function generateCaptcha() {
  num1 = Math.floor(Math.random() * 10);
  num2 = Math.floor(Math.random() * 10);
  document.getElementById("captchaText").innerText = num1 + " + " + num2;
}

generateCaptcha();

// 🔥 AUTO LOGIN
auth.onAuthStateChanged(user => {
  if (user) {
    window.location.href = "home.html";
  }
});

// ✅ VALIDATION
function checkAll() {
  if (!document.getElementById("agree").checked) {
    alert("Please agree to Nexa policies");
    return false;
  }

  const answer = document.getElementById("captchaInput").value;
  if (parseInt(answer) !== num1 + num2) {
    alert("Captcha incorrect");
    generateCaptcha();
    return false;
  }

  return true;
}

// 🔐 LOGIN
function login() {
  if (!checkAll()) return;

  const email = email.value;
  const password = password.value;
  const remember = document.getElementById("remember").checked;

  const persistence = remember
    ? firebase.auth.Auth.Persistence.LOCAL
    : firebase.auth.Auth.Persistence.SESSION;

  auth.setPersistence(persistence).then(() => {
    return auth.signInWithEmailAndPassword(email, password);
  })
  .then(() => window.location.href = "home.html")
  .catch(err => alert(err.message));
}

// 🆕 SIGNUP
function signup() {
  if (!checkAll()) return;

  const email = email.value;
  const password = password.value;

  auth.createUserWithEmailAndPassword(email, password)
    .then(() => alert("Account created! Now login"))
    .catch(err => alert(err.message));
}

// 🔵 GOOGLE LOGIN
function googleLogin() {
  if (!checkAll()) return;

  const provider = new firebase.auth.GoogleAuthProvider();

  auth.signInWithPopup(provider)
    .then(() => window.location.href = "home.html")
    .catch(err => alert(err.message));
}
</script>

</body>
</html>
