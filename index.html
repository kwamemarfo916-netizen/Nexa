<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexa Login</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>

<style>
body {
  background-image: url('IMG-20260320-WA0072.jpg');
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  font-family: Arial;
}

/* Glass Card */
.glass {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 320px;
  padding: 30px;
  border-radius: 20px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(15px);
  border: 1px solid rgba(255,255,255,0.2);
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  text-align: center;
  color: white;
}

input {
  width: 90%;
  margin-top: 10px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: rgba(255,255,255,0.2);
  color: white;
}

button {
  width: 95%;
  margin-top: 12px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: rgba(255,255,255,0.2);
  color: white;
  cursor: pointer;
}

button:hover {
  background: rgba(255,255,255,0.4);
}

.google {
  background: white;
  color: black;
  font-weight: bold;
}

.small {
  font-size: 12px;
  opacity: 0.7;
}
</style>
</head>

<body>

<div class="glass">
  <h2>NEXA</h2>
  <p class="small">Login to continue</p>

  <!-- EMAIL -->
  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <!-- REMEMBER ME -->
  <div style="text-align:left; margin-top:10px;">
    <input type="checkbox" id="remember"> Remember me
  </div>

  <button onclick="loginEmail()">Login with Email</button>

  <p class="small">OR</p>

  <!-- PHONE -->
  <input id="phone" type="tel" placeholder="+233XXXXXXXXX">
  <div id="recaptcha-container"></div>

  <button onclick="sendCode()">Send Code</button>

  <input id="code" placeholder="Enter Code">
  <button onclick="verifyCode()">Verify Code</button>

  <p class="small">OR</p>

  <!-- GOOGLE -->
  <button class="google" onclick="googleLogin()">Continue with Google</button>

  <p class="small">Don't have an account? Sign up</p>
</div>

<script>
// 🔥 PUT YOUR FIREBASE CONFIG HERE
const firebaseConfig = {
  apiKey: "AIzaSyA26P-LTPAmChtCrDg601qGcPYK5uJDqeA",
  authDomain: "mega-project-3cee2.firebaseapp.com",
  projectId: "mega-project-3cee2"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// ✅ AUTO LOGIN (REMEMBER USER)
auth.onAuthStateChanged(user => {
  if (user) {
    window.location.href = "home.html";
  }
});

// ✅ EMAIL LOGIN
function loginEmail() {
  const email = email.value;
  const password = password.value;
  const remember = document.getElementById("remember").checked;

  const persistence = remember
    ? firebase.auth.Auth.Persistence.LOCAL
    : firebase.auth.Auth.Persistence.SESSION;

  auth.setPersistence(persistence).then(() => {
    return auth.signInWithEmailAndPassword(email, password);
  })
  .then(() => {
    window.location.href = "home.html";
  })
  .catch(err => alert(err.message));
}

// ✅ GOOGLE LOGIN
function googleLogin() {
  const provider = new firebase.auth.GoogleAuthProvider();

  auth.signInWithPopup(provider)
    .then(() => window.location.href = "home.html")
    .catch(err => alert(err.message));
}

// ✅ RECAPTCHA
window.onload = function () {
  window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier(
    'recaptcha-container',
    { size: 'normal' }
  );
};

// ✅ SEND OTP
function sendCode() {
  const phone = document.getElementById("phone").value;

  auth.signInWithPhoneNumber(phone, window.recaptchaVerifier)
    .then(res => {
      window.confirmationResult = res;
      alert("Code sent!");
    })
    .catch(err => alert(err.message));
}

// ✅ VERIFY OTP
function verifyCode() {
  const code = document.getElementById("code").value;

  confirmationResult.confirm(code)
    .then(() => window.location.href = "home.html")
    .catch(err => alert("Invalid code"));
}
</script>

</body>
</html>
